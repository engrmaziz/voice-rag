<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS_CORE_TERMINAL</title>
    <style>
        :root {
            /* Dark Theme (Default) */
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f1f5f9;
            --accent: #10b981; /* Emerald Green */
            --border: #334155;
            --input: #0f172a;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --panel: #ffffff;
            --text: #1e293b;
            --accent: #059669; /* Darker Emerald */
            --border: #cbd5e1;
            --input: #f1f5f9;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        .terminal {
            width: 100%;
            max-width: 900px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        .header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel);
        }

        .log-stream {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .log-entry {
            display: flex;
            gap: 1rem;
            line-height: 1.5;
        }

        .timestamp { color: var(--accent); font-size: 0.8rem; flex-shrink: 0; }
        .sender { color: var(--accent); font-weight: bold; width: 80px; }
        .content { white-space: pre-wrap; }

        .input-bar {
            padding: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
            background: var(--panel);
        }

        input {
            flex: 1;
            background: var(--input);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.8rem;
            font-family: inherit;
        }

        button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.8rem;
            cursor: pointer;
        }
        button:hover { border-color: var(--accent); color: var(--accent); }
        button.recording { color: #ef4444; border-color: #ef4444; }

        .theme-toggle { cursor: pointer; border: none; background: none; color: var(--text); }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <div>> AEGIS_V.1.0 // UPLINK: <span id="status">INIT</span></div>
        <button class="theme-toggle" onclick="toggleTheme()">[TOGGLE_THEME]</button>
    </div>

    <div id="log" class="log-stream"></div>

    <div class="input-bar">
        <button id="mic-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
        </button>
        <input type="text" id="text-input" placeholder=">_ entry_query" autocomplete="off">
        <button id="send-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>
</div>

<script>
    const log = document.getElementById('log');
    const input = document.getElementById('text-input');
    const status = document.getElementById('status');

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        document.documentElement.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
    }

    const ws = new WebSocket((window.location.protocol === "https:" ? "wss" : "ws") + '://' + window.location.host + '/ws/chat/1/');

    ws.onopen = () => status.innerText = 'ONLINE';
    ws.onclose = () => status.innerText = 'OFFLINE';

    function addLog(sender, text) {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerHTML = `<span class="timestamp">${new Date().toLocaleTimeString()}</span><span class="sender">[${sender}]</span><span class="content">${text}</span>`;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if(data.answer) addLog('AI', data.answer);
        else if(data.message) addLog('SYS', data.message);
        else if(data.error) addLog('ERR', data.error);
    };

    document.getElementById('send-btn').onclick = () => {
        if(input.value) {
            addLog('USER', input.value);
            ws.send(JSON.stringify({question: input.value}));
            input.value = '';
        }
    };

    // Mic logic
    let mediaRecorder, chunks = [];
    navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            document.getElementById('mic-btn').classList.remove('recording');
            ws.send(new Blob(chunks));
            chunks = [];
        };
    });

    document.getElementById('mic-btn').onmousedown = () => {
        mediaRecorder.start();
        document.getElementById('mic-btn').classList.add('recording');
    };
    document.getElementById('mic-btn').onmouseup = () => mediaRecorder.stop();
</script>
</body>
</html>
