<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Assistant</title>
    <style>
        :root {
            --bg-color: #f9fafb;
            --surface-color: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --user-bubble: #f3f4f6;
            --accent-color: #374151;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 800px;
            background: var(--surface-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            background: var(--surface-color);
        }

        .header h1 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: var(--text-primary);
        }

        .status-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #d1d5db;
            border-radius: 50%;
            transition: background-color 0.3s;
        }

        .status-dot.connected {
            background-color: #10b981;
        }

        .chat-history {
            flex: 1;
            padding: 32px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            max-width: 80%;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .msg-user {
            align-self: flex-end;
            background: var(--user-bubble);
            padding: 14px 20px;
            border-radius: 20px 20px 4px 20px;
            color: var(--text-primary);
        }

        .msg-ai {
            align-self: flex-start;
            background: var(--surface-color);
            padding: 14px 20px;
            border-radius: 20px 20px 20px 4px;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .msg-system {
            align-self: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: transparent;
        }

        .input-area {
            padding: 20px 24px;
            background: var(--surface-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            background: var(--bg-color);
            border: 1px solid transparent;
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s;
        }

        input[type="text"]:focus {
            background: var(--surface-color);
            border-color: var(--border-color);
            box-shadow: 0 0 0 3px rgba(243, 244, 246, 1);
        }

        button {
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        #send-btn {
            background: var(--text-primary);
            color: #ffffff;
        }

        #send-btn:hover {
            background: #374151;
        }

        #mic-btn {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 14px 18px;
        }

        #mic-btn:hover {
            background: var(--bg-color);
        }

        #mic-btn.recording {
            background: #fef2f2;
            border-color: #fca5a5;
            color: #ef4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="chat-wrapper">
        <div class="header">
            <h1>Workspace</h1>
            <div class="status-text">
                <div id="status-dot" class="status-dot"></div>
                <span id="status-label">Initializing...</span>
            </div>
        </div>

        <div id="chat-history" class="chat-history">
            </div>

        <div class="input-area">
            <button id="mic-btn">Mic</button>
            <input type="text" id="text-input" placeholder="Type a message..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const textInput = document.getElementById('text-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const statusDot = document.getElementById('status-dot');
        const statusLabel = document.getElementById('status-label');

        // Using conversation_id '1' for current test environment
        const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
        const wsPath = wsScheme + '://' + window.location.host + '/ws/chat/1/';
        const chatSocket = new WebSocket(wsPath);

        chatSocket.onopen = function(e) {
            statusDot.classList.add('connected');
            statusLabel.innerText = 'Online';
        };

        chatSocket.onclose = function(e) {
            statusDot.classList.remove('connected');
            statusLabel.innerText = 'Offline';
            appendMessage('Connection closed.', 'system');
        };

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            
            if (data.type === 'system' || data.type === 'status') {
                appendMessage(data.message, 'system');
            } else if (data.answer) {
                appendMessage(data.answer, 'ai');
            } else if (data.error) {
                appendMessage("Error: " + data.error, 'system');
            }
        };

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', `msg-${sender}`);
            msgDiv.innerText = text;
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        // --- Text Input Handling ---
        function sendText() {
            const message = textInput.value.trim();
            if (message) {
                appendMessage(message, 'user');
                chatSocket.send(JSON.stringify({ 'question': message }));
                textInput.value = '';
            }
        }

        sendBtn.onclick = sendText;
        textInput.onkeypress = function(e) {
            if (e.key === 'Enter') sendText();
        };

        // --- Voice Recording Handling ---
        let mediaRecorder;
        let audioChunks = [];

        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                
                mediaRecorder.ondataavailable = e => {
                    audioChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    micBtn.classList.remove('recording');
                    micBtn.innerText = 'Mic';
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioChunks = [];
                    chatSocket.send(audioBlob);
                };
            })
            .catch(err => {
                console.error("Microphone access denied:", err);
                micBtn.innerText = 'No Mic';
                micBtn.disabled = true;
            });

        micBtn.onmousedown = () => {
            if (mediaRecorder && mediaRecorder.state === "inactive") {
                mediaRecorder.start();
                micBtn.classList.add('recording');
                micBtn.innerText = 'Listening...';
            }
        };

        micBtn.onmouseup = () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
            }
        };
    </script>
</body>
</html>
